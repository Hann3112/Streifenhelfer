  <title>Streifenhelfer</title>
  <style>
    :root {
      --primary-navy: #0a2540;
      --police-blue: #0056b3;
      --police-blue-hover: #003d80;
      --accent-gold: #f1c40f;
      --bg-gray: #f4f6f9;
      --card-bg: #ffffff;
      --text-dark: #1e293b;
      --text-muted: #64748b;
      --danger-red: #dc2626;
      --danger-red-hover: #b91c1c;
      --border-color: #e2e8f0;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-gray);
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    header {
      background-color: var(--primary-navy);
      color: #ffffff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      z-index: 10;
      min-height: 60px;
    }

    .header-title-container {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      padding-right: 10px;
      overflow: hidden;
    }

    .app-subtitle {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent-gold);
      font-weight: 700;
    }

    .header-title {
      font-size: 17px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-toggle-btn {
      background: none;
      border: none;
      color: #ffffff;
      cursor: pointer;
      padding: 6px;
      display: none; /* Only visible on list pages */
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background 0.2s;
    }

    .search-toggle-btn:active {
      background: rgba(255, 255, 255, 0.2);
    }

    .search-toggle-btn svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Search Container */
    .search-bar-container {
      background-color: var(--primary-navy);
      padding: 0 16px 12px 16px;
      display: none;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .search-bar-container.active {
      display: block;
    }

    .search-input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      font-size: 15px;
      outline: none;
      background: #ffffff;
      color: var(--text-dark);
      padding-right: 44px;
    }

    .search-bar-inner {
      position: relative;
    }

    .search-clear-btn {
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      border: none;
      background: none;
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      padding: 6px;
      line-height: 1;
      border-radius: 50%;
    }

    .search-clear-btn:hover {
      color: var(--police-blue);
    }

    .search-meta {
      margin-top: 8px;
      color: #dbeafe;
      font-size: 13px;
      min-height: 1.2em;
    }

    /* Main Content Area */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .grid-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 600px;
      margin: 0 auto;
    }

    /* Spacer am Ende der Liste, damit nichts unter dem Zurück-Button verschwindet */
    .grid-container::after {
      content: "";
      display: block;
      height: 110px; 
      flex-shrink: 0;
    }

    /* Buttons */
    .btn {
      background-color: var(--card-bg);
      color: var(--police-blue);
      border: 1.5px solid var(--border-color);
      padding: 16px 18px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.15s ease;
    }

    .btn:active {
      transform: scale(0.98);
      background-color: #ebf5ff;
      border-color: var(--police-blue);
    }

    .btn-arrow {
      color: var(--text-muted);
      font-size: 18px;
    }

    .btn-danger {
      background-color: var(--danger-red);
      color: #ffffff;
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 4px rgba(220, 38, 38, 0.3);
    }

    .btn-danger:active {
      background-color: var(--danger-red-hover);
    }

    /* Cards / Info Boxes */
    .card {
      background-color: var(--card-bg);
      border-radius: 10px;
      padding: 14px 16px;
      border-left: 4px solid var(--police-blue);
      box-shadow: var(--shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      line-height: 1.4;
      cursor: default;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card.clickable {
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
    }

    .card-title {
      font-weight: 600;
      color: var(--text-dark);
    }

    .card-value {
      font-weight: 700;
      color: var(--police-blue);
      text-align: right;
    }

    .doc-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    /* Fixed Bottom Bar for Back Button */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(244, 246, 249, 0.95);
      backdrop-filter: blur(8px);
      padding: 12px 16px;
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: center;
      z-index: 20;
    }

    .btn-back {
      background-color: var(--primary-navy);
      color: #ffffff;
      border: none;
      width: 100%;
      max-width: 600px;
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-back:active {
      background-color: #05182b;
      transform: scale(0.99);
    }

    .no-results {
      text-align: center;
      color: var(--text-muted);
      padding: 20px;
      font-style: italic;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 80px;
      transform: translateX(-50%) translateY(0);
      min-width: 180px;
      max-width: 90%;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.95);
      color: #ffffff;
      border-radius: 999px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.18);
      font-size: 13px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      z-index: 50;
    }

    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(-6px);
    }

    @media (max-width: 540px) {
      header {
        padding: 12px 14px;
      }

      .header-title {
        font-size: 15px;
      }

      .app-subtitle {
        font-size: 9px;
      }

      .search-bar-container {
        padding: 0 14px 10px;
      }

      .search-input {
        font-size: 14px;
        padding: 12px 14px;
      }

      .grid-container {
        gap: 10px;
        padding: 0 0 4px;
      }

      .btn {
        padding: 14px 16px;
        font-size: 14px;
      }

      .card {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .card-value {
        width: 100%;
        text-align: right;
        word-break: break-word;
      }

      .doc-row {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }

      .btn-danger {
        width: 100%;
        justify-content: center;
      }

      .bottom-bar {
        padding: 10px 14px;
      }

      .btn-back {
        font-size: 15px;
        padding: 13px;
      }
    }
  </style>
</head>

          { label: 'Hagenburg', val: 'Wieland 31/01' }
        ]
      }
    };

    // State Management
    let historyStack = ['home'];
    let currentFilter = '';

    // DOM Elements
    const pageTitleEl = document.getElementById('page-title');
    const appViewEl = document.getElementById('app-view');
    const bottomBarEl = document.getElementById('bottom-bar');
    const searchToggleBtn = document.getElementById('search-toggle');
    const searchContainer = document.getElementById('search-container');
    const searchInput = document.getElementById('search-input');
    const searchClearBtn = document.getElementById('search-clear');
    const searchMetaEl = document.getElementById('search-meta');
    const toastEl = document.getElementById('toast');

    function init() {
      renderPage();

      searchInput.addEventListener('input', (e) => {
        currentFilter = e.target.value.toLowerCase().trim();
        filterCurrentCards();
      });

      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          hideSearch();
        }
      });

      searchClearBtn.addEventListener('click', () => {
        searchInput.value = '';
        currentFilter = '';
        filterCurrentCards();
        searchInput.focus();
      });

      searchToggleBtn.addEventListener('click', () => {
        const isVisible = searchContainer.classList.contains('active');
        if (isVisible) {
          hideSearch();
        } else {
          searchContainer.classList.add('active');
          searchInput.focus();
        }
      });
    }

    function hideSearch() {
      searchContainer.classList.remove('active');
      searchInput.value = '';
      currentFilter = '';
      filterCurrentCards();
    }

    function navigateTo(targetKey) {
      if (!appTree[targetKey]) {
        alert('Inhalt befindet sich noch im Aufbau.');
        return;
      }
      historyStack.push(targetKey);
      hideSearch();
      renderPage();
    }

    function goBack() {
      if (historyStack.length > 1) {
        historyStack.pop();
        hideSearch();
        renderPage();
      }
    }

    function renderPage() {
      const currentKey = historyStack[historyStack.length - 1];
      const pageData = appTree[currentKey];

      // Update Title
      pageTitleEl.textContent = pageData.title;

      // Toggle Back Button Visibility
      if (historyStack.length > 1) {
        bottomBarEl.style.display = 'flex';
      } else {
        bottomBarEl.style.display = 'none';
      }

      // Toggle Search Icon Visibility
      if (pageData.hasSearch) {
        searchToggleBtn.style.display = 'flex';
        searchInput.placeholder = `Suche ${pageData.title}…`;
      } else {
        searchToggleBtn.style.display = 'none';
      }

      // Clear Current View
      appViewEl.innerHTML = '';

      // Render View Content
      if (pageData.type === 'buttons') {
        pageData.items.forEach(item => {
          const btn = document.createElement('button');
          btn.className = 'btn';
          btn.innerHTML = `<span>${item.label}</span><span class="btn-arrow">&#8250;</span>`;
          btn.onclick = () => {
            // Navigate to subpage if target specified
            if (item.target) {
              navigateTo(item.target);
              return;
            }
            // Open image file in a new tab if img specified
            if (item.img) {
              window.open(item.img, '_blank');
              return;
            }
            // Open PDF in a new tab if pdf specified
            if (item.pdf) {
              window.open(item.pdf, '_blank');
              return;
            }
            // Open URL in a new tab if url specified
            if (item.url) {
              window.open(item.url, '_blank');
              return;
            }
            // Fallback: notify user
            alert('Aktion nicht definiert für: ' + item.label);
          };
          appViewEl.appendChild(btn);
        });
      } 
      else if (pageData.type === 'cards') {
        renderCards(pageData.items);
      } 
      else if (pageData.type === 'doc_buttons') {
        pageData.items.forEach(item => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <div class="doc-row">
              <span class="card-title">${item.label}</span>
              <button class="btn-danger" onclick="navigateTo('${item.target}')">Fehlt</button>
            </div>
          `;
          appViewEl.appendChild(card);
        });
      }
      else if (pageData.type === 'bepo_special') {
        renderCards(pageData.items);
        if (pageData.extraButton) {
          const btn = document.createElement('button');
          btn.className = 'btn';
          btn.style.marginTop = '8px';
          btn.innerHTML = `<span>${pageData.extraButton.label}</span><span class="btn-arrow">&#8250;</span>`;
          btn.onclick = () => navigateTo(pageData.extraButton.target);
          appViewEl.appendChild(btn);
        }
      }

      // Scroll to top of main area
      document.getElementById('main-content').scrollTop = 0;
    }

    function renderCards(items) {
      let visibleCount = 0;
      items.forEach(item => {
        const matches = !currentFilter || 
                        item.label.toLowerCase().includes(currentFilter) || 
                        item.val.toLowerCase().includes(currentFilter);
        
        const card = document.createElement('div');
        card.className = 'card';
        card.style.display = matches ? 'flex' : 'none';
        card.innerHTML = `
          <span class="card-title">${item.label}</span>
          <span class="card-value">${item.val}</span>
        `;
        if (item.color) {
        card.style.borderLeftColor = item.color;
        const valueEl = card.querySelector('.card-value');
        if (valueEl) {
          valueEl.style.color = item.color;
        }
      }

      if (item.val) {
        card.classList.add('clickable');
        card.tabIndex = 0;
        card.setAttribute('role', 'button');
        card.title = 'Klicke oder drücke Enter, um den Wert zu kopieren';
        card.addEventListener('click', () => {
          navigator.clipboard.writeText(item.val).then(() => {
            showToast(`Kopiert: ${item.val}`);
          }).catch(() => {
            showToast('Kopieren fehlgeschlagen');
          });
        });
        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            card.click();
          }
        });
      }

      appViewEl.appendChild(card);

        if (matches) visibleCount++;
      });

      if (visibleCount === 0 && currentFilter !== '') {
        const noRes = document.createElement('div');
        noRes.className = 'no-results';
        noRes.textContent = 'Keine Ergebnisse gefunden.';
        appViewEl.appendChild(noRes);
      }

      return visibleCount;
    }

    function updateSearchMeta(visibleCount) {
      if (!searchMetaEl) return;
      if (!currentFilter) {
        searchMetaEl.textContent = '';
        return;
      }
      const label = visibleCount === 1 ? 'Eintrag' : 'Einträge';
      searchMetaEl.textContent = `${visibleCount} ${label} gefunden`;
    }

    function filterCurrentCards() {
      const currentKey = historyStack[historyStack.length - 1];
      const pageData = appTree[currentKey];
      if (!pageData) return;

      // If current page shows cards or BEPO special cards, render and filter normally
      if (pageData.type === 'cards' || pageData.type === 'bepo_special') {
        appViewEl.innerHTML = '';
        const visibleCount = renderCards(pageData.items);
        updateSearchMeta(visibleCount);
        if (pageData.type === 'bepo_special' && pageData.extraButton && !currentFilter) {
          const btn = document.createElement('button');
          btn.className = 'btn';
          btn.style.marginTop = '8px';
          btn.innerHTML = `<span>${pageData.extraButton.label}</span><span class="btn-arrow">&#8250;</span>`;
          btn.onclick = () => navigateTo(pageData.extraButton.target);
          appViewEl.appendChild(btn);
        }
        if (pageData.type === 'bepo_special' && pageData.extraButtons && Array.isArray(pageData.extraButtons) && !currentFilter) {
          pageData.extraButtons.forEach(extra => {
            if (pageData.extraButton && pageData.extraButton.target === extra.target) return;
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.style.marginTop = '8px';
            btn.innerHTML = `<span>${extra.label}</span><span class="btn-arrow">&#8250;</span>`;
            btn.onclick = () => navigateTo(extra.target);
            appViewEl.appendChild(btn);
          });
        }
        return;
      }

      // For buttons pages that enable search (e.g. 'funk'), aggregate child card items
      // from their target pages and render them so the search can match Dienststellen/Kennung
      if (pageData.type === 'buttons' && pageData.hasSearch) {
        const aggregated = [];
        pageData.items.forEach(btn => {
          const key = btn.target;
          if (!key) return;
          const child = appTree[key];
          if (!child || !Array.isArray(child.items)) return;

          // If child page already contains cards, collect them
          if (child.type === 'cards') {
            child.items.forEach(it => {
              if (it.label && it.val) aggregated.push({ label: it.label, val: it.val, color: it.color });
            });
          }

          // If child is a buttons page (e.g., PD listing PIs), descend one level
          if (child.type === 'buttons') {
            child.items.forEach(sub => {
              const subKey = sub.target;
              if (!subKey) return;
              const subChild = appTree[subKey];
              if (!subChild || !Array.isArray(subChild.items)) return;
              if (subChild.type === 'cards') {
                subChild.items.forEach(it => {
                  if (it.label && it.val) aggregated.push({ label: it.label, val: it.val, color: it.color });
                });
              }
            });
          }
        });

        appViewEl.innerHTML = '';
        const visibleCount = renderCards(aggregated);
        updateSearchMeta(visibleCount);
        return;
      }
    }

    // Start App
    init();
  </script>
